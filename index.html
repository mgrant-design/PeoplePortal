       also avoids requesting it on the live host. Loads off-prod (or with ?dev=1). -->
  <script>
    (function () {
      var h = location.hostname;
      var isProd = /azurestaticapps\.net$/.test(h);   // add your custom prod domain here too

      try { force = new URLSearchParams(location.search).has('dev'); } catch (e) {}
